<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ARCUBIQ</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

<a-scene
mindar-image="
imageTargetSrc: targets.mind;
filterMinCF:0.0001;
filterBeta:0.001;
warmupTolerance:5;
missTolerance:20;"
color-space="sRGB"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-assets>
  <audio id="heartbeat" src="audio/heartbeat.mp3"></audio>
</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled: false">
</a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-gltf-model
id="heartModel"
src="models/heart.glb"
position="0 -0.2 0"
rotation="0 0 0"
scale="1.5 1.5 1.5"

animation="
property: scale;
to: 2.1 2.1 2.1;
dir: alternate;
loop: true;
dur: 900;">
</a-gltf-model>

</a-entity>
</a-scene>

<div id="infoBox">

<h2>❤️ JANTUNG</h2>

<p><b>Fungsi:</b></p>

<ul>
<li>Mengepam darah ke seluruh badan.</li>
<li>Membekalkan oksigen kepada semua sel.</li>
<li>Mengangkut nutrien ke seluruh badan.</li>
</ul>

<p><b>Tahukah Anda?</b></p>

<p>Jantung manusia berdegup kira-kira
100,000 kali sehari.</p>

</div>

<script src="script.js"></script>

</body>

</html>

</html>
